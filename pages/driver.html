DOCTYPE html>
<html lang="ar" dir="rtl" class="transition-colors duration-300">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="driver_dashboard">لوحة تحكم السائق | EnQaZ</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Cairo', 'sans-serif'] }, colors: { primary: '#dc2626', secondary: '#0f172a' } } }
        }
    </script>
    <style>
        body { overflow: hidden; margin: 0; padding: 0; background-color: #0f172a; }
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        
        .emergency-glow {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            box-shadow: inset 0 0 100px 30px rgba(220, 38, 38, 0);
            pointer-events: none; z-index: 999; transition: all 0.3s;
        }
        .emergency-glow.active { animation: pulse-glow 1.5s infinite; }
        @keyframes pulse-glow {
            0% { box-shadow: inset 0 0 50px 10px rgba(220, 38, 38, 0.4); }
            50% { box-shadow: inset 0 0 150px 40px rgba(220, 38, 38, 0.9); }
            100% { box-shadow: inset 0 0 50px 10px rgba(220, 38, 38, 0.4); }
        }

        .leaflet-marker-icon { transition: transform 0.5s linear !important; }
        #map-container { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-origin: center center; }
        .is-interacting .leaflet-marker-icon { transition: none !important; }
    </style>
</head>
<body class="bg-gray-100 dark:bg-secondary text-gray-800 dark:text-gray-100">

    <audio id="sirenAudio" loop>
        <source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg">
    </audio>

    <div id="emergencyGlow" class="emergency-glow"></div>

    <div id="map-container" class="absolute inset-0 z-0"></div>

    <div class="absolute left-6 top-1/2 transform -translate-y-1/2 flex flex-col gap-3 z-[1000]">
        
        <div class="bg-white/90 dark:bg-gray-900/90 backdrop-blur rounded-2xl shadow-xl border border-gray-200 dark:border-gray-700 p-2 flex flex-col gap-2 items-center">
            <div class="text-[9px] text-center font-black text-gray-500 uppercase w-full border-b border-gray-200 dark:border-gray-700 pb-1 mb-1"><i class="fa-regular fa-compass"></i></div>
            <button onclick="rotateMap(0)" class="w-8 h-8 rounded-xl bg-gray-100 dark:bg-gray-800 hover:bg-blue-500 hover:text-white text-xs font-bold transition-colors">N</button>
            <div class="flex gap-2">
                <button onclick="rotateMap(90)" class="w-8 h-8 rounded-xl bg-gray-100 dark:bg-gray-800 hover:bg-blue-500 hover:text-white text-xs font-bold transition-colors">E</button>
                <button onclick="rotateMap(270)" class="w-8 h-8 rounded-xl bg-gray-100 dark:bg-gray-800 hover:bg-blue-500 hover:text-white text-xs font-bold transition-colors">W</button>
            </div>
            <button onclick="rotateMap(180)" class="w-8 h-8 rounded-xl bg-gray-100 dark:bg-gray-800 hover:bg-blue-500 hover:text-white text-xs font-bold transition-colors">S</button>
            
            <div class="w-full h-px bg-gray-200 dark:bg-gray-700 my-1"></div>
            
            <button id="compassLockBtn" onclick="toggleCompassLock()" class="w-8 h-8 rounded-xl bg-gray-100 dark:bg-gray-800 hover:bg-blue-100 dark:hover:bg-blue-900/50 text-gray-500 text-xs font-bold transition-colors shadow-sm" title="دوران تلقائي مع مسار الإسعاف">
                <i class="fa-solid fa-lock-open" id="compassLockIcon"></i>
            </button>
        </div>

        <div class="bg-white/90 dark:bg-gray-900/90 backdrop-blur rounded-2xl shadow-xl border border-gray-200 dark:border-gray-700 p-2 flex flex-col gap-2">
            <button onclick="map.zoomIn()" class="w-8 h-8 rounded-xl bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors"><i class="fa-solid fa-plus"></i></button>
            <button onclick="map.zoomOut()" class="w-8 h-8 rounded-xl bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors"><i class="fa-solid fa-minus"></i></button>
            <div class="w-full h-px bg-gray-200 dark:bg-gray-700 my-1"></div>
            <button id="trackToggleBtn" onclick="toggleTracking()" class="w-8 h-8 rounded-xl bg-blue-500 text-white hover:bg-blue-600 transition-colors shadow-lg shadow-blue-500/30" title="تتبع تلقائي"><i class="fa-solid fa-crosshairs"></i></button>
        </div>
    </div>

    <button onclick="toggleSidePanel()" class="absolute top-6 right-6 z-[1001] w-12 h-12 bg-white dark:bg-gray-900 rounded-2xl shadow-xl border border-gray-200 dark:border-gray-800 flex items-center justify-center text-xl hover:text-primary transition-colors">
        <i class="fa-solid fa-bars"></i>
    </button>

    <div id="sidePanel" class="absolute top-0 right-0 h-full w-96 bg-white/95 dark:bg-gray-900/95 backdrop-blur-xl shadow-2xl border-l border-gray-200 dark:border-gray-800 transition-transform duration-300 z-[1000] flex flex-col translate-x-0">
        <div class="p-6 border-b border-gray-100 dark:border-gray-800 flex justify-between items-center bg-gray-50 dark:bg-white/5">
            <div>
                <h1 class="text-xl font-black flex items-center gap-2"><i class="fa-solid fa-truck-medical text-primary"></i> <span id="ambulanceCode">جاري التحميل...</span></h1>
                <div class="text-xs text-gray-500 mt-1" id="driverName">سائق الإسعاف</div>
            </div>
<div class="flex gap-2">
    <button id="logoutBtn" class="w-10 h-10 rounded-full bg-red-100 dark:bg-red-900/30 flex items-center justify-center transition-colors hover:text-white hover:bg-red-600 text-red-500 shadow-sm" title="تسجيل الخروج"><i class="fa-solid fa-right-from-bracket"></i></button>
    <button id="themeToggleBtn" class="w-10 h-10 rounded-full bg-gray-200 dark:bg-gray-800 flex items-center justify-center transition-colors hover:text-blue-500"><span id="themeIcon">🌙</span></button>
    <button id="langToggleBtn" class="px-3 min-w-[40px] h-10 rounded-full bg-gray-200 dark:bg-gray-800 flex items-center justify-center font-bold text-xs transition-colors hover:text-primary">EN</button>
</div>
        </div>

        <div id="panelContent" class="flex-1 overflow-y-auto p-6 flex flex-col gap-4"></div>

        <div id="actionArea" class="p-6 border-t border-gray-100 dark:border-gray-800 bg-gray-50 dark:bg-white/5 hidden">
            <button id="mainActionBtn" class="w-full py-4 rounded-xl font-black text-lg transition-all shadow-lg active:scale-95"></button>
        </div>
    </div>

    <div id="customModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[2000] hidden flex items-center justify-center opacity-0 transition-opacity duration-300">
        <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-2xl max-w-sm w-full mx-4 transform scale-95 transition-transform duration-300 border border-gray-200 dark:border-gray-700">
            <h3 id="modalTitle" class="text-xl font-black mb-2 text-gray-800 dark:text-white">تنبيه</h3>
            <p id="modalMsg" class="text-gray-600 dark:text-gray-300 mb-6 text-sm"></p>
            <button onclick="closeModal()" class="w-full bg-primary text-white py-3 rounded-xl font-bold hover:bg-red-700 transition-colors">حسناً</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="../js/core/language.js"></script>
    <script type="module" src="../js/core/theme.js"></script>
    <script type="module" src="../js/driver/driver.js"></script>
</body>
</html>
