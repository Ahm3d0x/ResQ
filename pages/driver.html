<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnQaZ | لوحة تحكم سيارة الإسعاف</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'] },
                    colors: {
                        primary: '#dc2626',
                        secondary: '#0f172a',
                        success: '#10b981',
                        warning: '#f59e0b'
                    }
                }
            }
        }
    </script>

    <style>
        #driverMap { height: calc(100vh - 80px); width: 100%; z-index: 1; }
        .mission-pulse { animation: pulseDanger 2s infinite; }
        @keyframes pulseDanger {
            0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(220, 38, 38, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
        }
        /* تحسين مظهر أزرار الخريطة لتناسب التابلت */
        .leaflet-control-zoom { border: none !important; margin-right: 20px !important; }
        .leaflet-control-zoom-in, .leaflet-control-zoom-out { 
            background: #1e293b !important; color: white !important; border: 1px solid #334155 !important; 
            width: 50px !important; height: 50px !important; line-height: 50px !important; font-size: 20px !important;
        }
    </style>
</head>
<body class="bg-secondary text-white overflow-hidden font-sans">

    <header class="h-20 bg-gray-900 border-b border-white/10 flex items-center justify-between px-6 z-50 relative shadow-2xl">
        <div class="flex items-center gap-5">
            <div class="relative">
                <div class="w-14 h-14 bg-primary/20 border-2 border-primary rounded-2xl flex items-center justify-center text-primary text-2xl mission-pulse">
                    <i class="fa-solid fa-truck-medical"></i>
                </div>
                <span id="liveIndicator" class="absolute -top-1 -left-1 w-4 h-4 bg-success rounded-full border-4 border-gray-900 animate-ping"></span>
            </div>
            <div>
                <h1 id="unitCodeDisplay" class="text-xl font-black tracking-tighter">وحدة الإسعاف: --</h1>
                <div class="flex items-center gap-2">
                    <span id="connectionStatus" class="w-2 h-2 rounded-full bg-success"></span>
                    <p id="statusLabel" class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em]">متصل بالنظام الذكي</p>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <div class="text-left hidden md:block">
                <p id="driverNameDisplay" class="font-bold text-sm">--</p>
                <p class="text-[10px] text-gray-500 uppercase">سائق معتمد</p>
            </div>
            <button id="logoutBtn" class="w-12 h-12 flex items-center justify-center rounded-xl bg-white/5 border border-white/10 hover:bg-red-500/20 hover:border-red-500/50 transition-all text-gray-400 hover:text-red-500">
                <i class="fa-solid fa-power-off"></i>
            </button>
        </div>
    </header>

    <main class="relative h-full w-full">
        <div id="driverMap" class="bg-slate-800"></div>

        <div id="missionCard" class="hidden absolute bottom-10 left-1/2 -translate-x-1/2 w-[94%] max-w-2xl z-[1000] animate-bounce-in">
            <div class="bg-gray-900/95 backdrop-blur-2xl border-2 border-white/10 rounded-[2.5rem] p-8 shadow-[0_30px_60px_-15px_rgba(0,0,0,0.5)]">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-4">
                        <div class="flex items-center gap-3">
                            <span class="px-3 py-1 bg-red-500 text-[10px] font-black rounded-lg animate-pulse">بلاغ نشط</span>
                            <span id="incidentId" class="text-[10px] font-mono text-gray-500">#INC-0000</span>
                        </div>
                        <h2 id="carInfo" class="text-3xl font-black leading-tight">--</h2>
                        <div class="flex flex-col gap-2">
                            <div class="flex items-center gap-2 text-gray-400 text-sm">
                                <i class="fa-solid fa-location-crosshairs text-primary"></i>
                                <span id="locationName">إحداثيات: جاري التحديد...</span>
                            </div>
                            <div class="flex items-center gap-2 text-gray-400 text-sm">
                                <i class="fa-solid fa-hospital text-blue-400"></i>
                                <span id="targetHospital">المستشفى الموجه إليه: --</span>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white/5 rounded-3xl p-5 border border-white/5 flex flex-col justify-center items-center">
                        <div class="grid grid-cols-2 w-full gap-4">
                            <div class="text-center">
                                <p class="text-[10px] text-gray-500 font-bold uppercase mb-1">قوة الاصطدام</p>
                                <p id="impactValue" class="text-3xl font-black text-orange-500">--</p>
                            </div>
                            <div class="text-center border-r border-white/10">
                                <p class="text-[10px] text-gray-500 font-bold uppercase mb-1">سرعة المركبة</p>
                                <p id="speedValue" class="text-3xl font-black text-blue-500">--</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-8">
                    <button id="mainActionBtn" class="w-full bg-primary hover:bg-red-700 text-white font-black py-6 rounded-3xl shadow-xl shadow-red-900/20 transition-all transform active:scale-[0.97] text-xl flex items-center justify-center gap-3">
                        <span id="btnText">تأكيد الاستجابة للطلب</span>
                        <i class="fa-solid fa-chevron-left rtl:rotate-180"></i>
                    </button>
                </div>
            </div>
        </div>

        <div id="idleState" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-center pointer-events-none opacity-20">
            <i class="fa-solid fa-radar fa-5x mb-6 text-gray-500 animate-pulse"></i>
            <h3 class="text-2xl font-bold text-gray-500 uppercase tracking-widest">في انتظار بلاغات جديدة</h3>
        </div>
    </main>

    <audio id="alertSound" src="../assets/sounds/emergency.mp3" preload="auto" loop></audio>

    <script type="module" src="../js/driver/driver.js"></script>

</body>
</html>
