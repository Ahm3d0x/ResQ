<!DOCTYPE html>
<html lang="en" dir="ltr" class="transition-colors duration-500">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResQ Admin | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'Cairo', 'sans-serif'] }, colors: { primary: '#dc2626', secondary: '#0f172a', surface: '#f8fafc', success: '#10b981', warning: '#f59e0b', info: '#3b82f6' } } } }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; } .dark ::-webkit-scrollbar-thumb { background: #334155; }
        .leaflet-incident-marker { animation: pulse-red 2s infinite; border-radius: 50%; border: 3px solid #dc2626; background: rgba(220, 38, 38, 0.4); box-shadow: 0 0 15px #dc2626; }
        @keyframes pulse-red { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }
        .leaflet-marker-icon { transition: transform 1s linear; } 
    </style>
</head>

<body class="bg-surface dark:bg-[#020408] text-secondary dark:text-gray-200 h-screen w-full overflow-hidden flex font-sans transition-colors duration-500">

    <aside id="sidebar" class="w-64 bg-white dark:bg-gray-900 border-r dark:border-l border-gray-200 dark:border-white/10 flex flex-col transition-all duration-300 z-50">
        <div class="h-16 flex items-center justify-center gap-3 border-b border-gray-200 dark:border-white/10">
            <div class="w-8 h-8 rounded-lg bg-primary/10 flex items-center justify-center text-primary"><i class="fa-solid fa-truck-medical"></i></div>
            <span class="text-xl font-black tracking-tight dark:text-white" data-i18n="logo">ResQ</span>
        </div>
        <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1" id="sidebarNav">
            <a href="#" class="flex items-center gap-3 px-3 py-2.5 bg-primary/10 text-primary rounded-lg font-bold" data-module="dashboard"><i class="fa-solid fa-chart-line w-5"></i> <span data-i18n="navDash">Dashboard</span></a>
            <a href="#" class="flex items-center gap-3 px-3 py-2.5 text-gray-500 hover:bg-gray-100 dark:hover:bg-white/5 rounded-lg font-semibold" data-module="incidents"><i class="fa-solid fa-triangle-exclamation w-5"></i> <span data-i18n="navIncidents">Incidents</span></a>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <header class="h-16 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b border-gray-200 dark:border-white/10 flex items-center justify-between px-6 z-40">
            <div class="flex items-center gap-6">
                <div class="bg-success/10 border border-success/30 px-3 py-1 rounded-full flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-success animate-pulse"></span>
                    <span class="text-xs font-bold text-success uppercase tracking-widest">Auto-Dispatch Active</span>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button id="themeToggleBtn" class="p-2 text-gray-500 dark:text-gray-400 hover:text-primary"><i id="themeIcon" class="fa-solid fa-moon text-xl"></i></button>
                <button id="langToggleBtn" class="font-bold text-sm px-3 py-1 bg-gray-100 dark:bg-white/5 rounded-md dark:text-white">AR</button>
            </div>
        </header>

        <main id="mainContainer" class="flex-1 p-4 overflow-hidden relative">
            
            <div id="detailsPanel" class="absolute top-4 right-4 w-80 bg-white/95 dark:bg-gray-900/95 backdrop-blur-xl border border-gray-200 dark:border-white/10 rounded-2xl shadow-2xl p-5 transform translate-x-[120%] transition-transform duration-500 z-[500] flex flex-col gap-4">
                <div class="flex justify-between items-center border-b border-gray-200 dark:border-white/10 pb-3">
                    <h3 id="panelTitle" class="font-black text-lg dark:text-white">Details</h3>
                    <button onclick="document.getElementById('detailsPanel').classList.add('translate-x-[120%]')" class="text-gray-500 hover:text-primary"><i class="fa-solid fa-xmark text-xl"></i></button>
                </div>
                <div id="panelContent" class="text-sm text-gray-600 dark:text-gray-300 space-y-3"></div>
            </div>

            <div id="module-dashboard" class="h-full grid grid-cols-1 lg:grid-cols-12 gap-4">
                <div class="lg:col-span-8 bg-white dark:bg-gray-900 border border-gray-200 dark:border-white/10 rounded-2xl overflow-hidden relative shadow-lg flex flex-col">
                    <div id="adminMap" class="flex-1 w-full bg-[#1a1a2e]"></div>
                </div>

                <div class="lg:col-span-4 flex flex-col gap-4 overflow-hidden h-full">
                    <div class="flex-1 flex flex-col bg-white dark:bg-gray-900 border border-gray-200 dark:border-white/10 rounded-2xl shadow-lg overflow-hidden">
                        <div class="p-4 border-b dark:border-white/10 flex justify-between items-center bg-gray-50 dark:bg-white/5">
                            <h3 class="font-bold text-sm dark:text-white"><i class="fa-solid fa-triangle-exclamation text-primary mr-2"></i> Active Incidents</h3>
                            <span id="pendingCountBadge" class="bg-primary/20 text-primary text-xs px-2 py-1 rounded-full font-bold">0 Pending</span>
                        </div>
                        <div class="flex-1 overflow-y-auto p-3 space-y-3" id="incidentsPanelList"></div>
                    </div>

                    <div class="h-1/3 flex flex-col bg-white dark:bg-gray-900 border border-gray-200 dark:border-white/10 rounded-2xl shadow-lg overflow-hidden">
                        <div class="p-3 border-b dark:border-white/10 flex justify-between items-center bg-gray-50 dark:bg-white/5">
                            <h3 class="font-bold text-sm dark:text-white"><i class="fa-solid fa-truck-fast text-success mr-2"></i> Fleet Status</h3>
                        </div>
                        <div class="flex-1 overflow-y-auto p-2" id="ambulancesPanelList"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="../js/core/language.js"></script>
    <script type="module" src="../js/core/theme.js"></script>
    <script type="module" src="../js/admin/main.js"></script>
</body>
</html>
