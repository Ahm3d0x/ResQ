<!DOCTYPE html>
<html lang="en" dir="ltr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResQ - Hardware Simulator (State Machine)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#dc2626', secondary: '#0f172a' } } }
        }
    </script>
</head>
<body class="bg-secondary text-white h-screen flex flex-col font-sans">

    <header class="bg-gray-900 border-b border-gray-800 p-4 flex justify-between items-center z-50 shadow-md">
                        <a href="../index.html" class="flex items-center group">
            <img src="../assets/images/logoL.png" alt="EnQaZ Logo" 
                 class="h-16 sm:h-18  w-auto border-2 border-gray-400 rounded-lg object-contain block dark:hidden transition-transform duration-300 group-hover:scale-105 drop-shadow-md">
            
            <img src="../assets/images/logoD.png" alt="EnQaZ Logo" 
                 class="h-16 sm:h-18  w-auto border-2 border-gray-500 rounded-lg object-contain hidden dark:block transition-transform duration-300 group-hover:scale-105 drop-shadow-md">
        </a>
        <div>
            <h1 class="text-2xl font-black text-primary"><i class="fa-solid fa-microchip"></i> Hardware Simulator</h1>
            <p class="text-xs text-gray-400 font-mono">Advanced State Machine & Lifecycle Manager</p>
        </div>
        <div id="statusBadge" class="px-3 py-1 bg-yellow-500/20 text-yellow-500 rounded text-xs font-bold border border-yellow-500/50">
            Connecting to Core...
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
        
        <div class="w-1/3 bg-gray-900 p-6 flex flex-col gap-5 border-r border-gray-800 overflow-y-auto z-10 shadow-2xl">
            
            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700">
                <label class="block text-sm font-bold text-gray-300 mb-2">1. Select Target Device</label>
                <select id="deviceSelect" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white outline-none focus:border-primary transition-colors">
                    <option value="">Loading devices...</option>
                </select>
            </div>

            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700">
                <label class="block text-sm font-bold text-gray-300 mb-2">2. Impact Location (Click Map)</label>
                <div class="grid grid-cols-2 gap-2">
                    <div class="bg-gray-900 p-2 rounded border border-gray-700">
                        <span class="text-[10px] text-gray-500 block">LATITUDE</span>
                        <span id="latDisplay" class="font-mono text-sm text-blue-400">Not selected</span>
                    </div>
                    <div class="bg-gray-900 p-2 rounded border border-gray-700">
                        <span class="text-[10px] text-gray-500 block">LONGITUDE</span>
                        <span id="lngDisplay" class="font-mono text-sm text-blue-400">Not selected</span>
                    </div>
                </div>
            </div>

            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700">
                <label class="block text-sm font-bold text-gray-300 mb-2">3. G-Force Severity</label>
                <select id="severitySelect" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white outline-none focus:border-primary">
                    <option value="high">High Impact (9.5 G - Airbags)</option>
                    <option value="medium">Medium Impact (4.5 G)</option>
                </select>
            </div>

            <div id="actionArea" class="mt-auto min-h-[80px] flex flex-col justify-end">
                <button id="triggerBtn" disabled class="w-full bg-primary text-white font-black text-lg py-4 rounded-xl hover:bg-red-700 disabled:opacity-50 disabled:cursor-not-allowed transition shadow-[0_0_20px_rgba(220,38,38,0.3)] flex items-center justify-center gap-2">
                    <i class="fa-solid fa-satellite-dish"></i> SEND CRASH SIGNAL
                </button>
                
                <div id="activeControlArea" class="hidden flex-col gap-2">
                    <div class="bg-gray-800 border border-gray-700 rounded-lg p-3 text-center">
                        <span class="text-[10px] text-gray-400 uppercase tracking-widest block mb-1">Active Incident Status</span>
                        <span id="activeStatusDisplay" class="font-black text-warning uppercase">PENDING</span>
                    </div>
                    <button id="cancelBtn" class="w-full bg-gray-700 text-white font-black text-sm py-4 rounded-xl hover:bg-gray-600 border border-gray-500 transition flex items-center justify-center gap-2">
                        <i class="fa-solid fa-ban text-red-400"></i> CANCEL INCIDENT (FALSE ALARM)
                    </button>
                </div>
            </div>
            
            <div id="logArea" class="h-40 bg-black rounded-lg p-3 font-mono text-[10px] text-green-400 overflow-y-auto border border-gray-800 shadow-inner leading-relaxed">
                > System State Machine Initialized.<br>
            </div>
        </div>

        <div id="simMap" class="w-2/3 h-full bg-black z-0 relative"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script type="module">
        import { supabase, DB_TABLES } from '../js/config/supabase.js';

        // UI Elements
        const deviceSelect = document.getElementById('deviceSelect');
        const latDisplay = document.getElementById('latDisplay');
        const lngDisplay = document.getElementById('lngDisplay');
        const triggerBtn = document.getElementById('triggerBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const actionArea = document.getElementById('actionArea');
        const activeControlArea = document.getElementById('activeControlArea');
        const activeStatusDisplay = document.getElementById('activeStatusDisplay');
        const statusBadge = document.getElementById('statusBadge');
        const logArea = document.getElementById('logArea');
        const severitySelect = document.getElementById('severitySelect');

        let selectedLat = null;
        let selectedLng = null;
        let currentActiveIncident = null; // يحمل بيانات الحادث النشط للجهاز المختار

        function log(msg, type = 'info') {
            const color = type === 'error' ? 'text-red-500' : type === 'success' ? 'text-blue-400' : 'text-green-400';
            logArea.innerHTML += `<span class="${color}">> ${msg}</span><br>`;
            logArea.scrollTop = logArea.scrollHeight;
        }

        // ==========================================
        // 1. Map Setup
        // ==========================================
        const map = L.map('simMap', {zoomControl: false}).setView([30.0444, 31.2357], 12);
        L.control.zoom({ position: 'topright' }).addTo(map);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        let crashMarker = null;

        map.on('click', function(e) {
            if(currentActiveIncident) return; // منع تغيير المكان لو في حادث نشط
            selectedLat = e.latlng.lat;
            selectedLng = e.latlng.lng;
            latDisplay.innerText = selectedLat.toFixed(5);
            lngDisplay.innerText = selectedLng.toFixed(5);

            if (crashMarker) map.removeLayer(crashMarker);
            crashMarker = L.marker([selectedLat, selectedLng], {
                icon: L.divIcon({ html: '<div class="w-6 h-6 bg-primary rounded-full border-2 border-white animate-pulse shadow-[0_0_15px_rgba(220,38,38,0.8)]"></div>', className: '' })
            }).addTo(map);

            updateUIState();
        });

        // ==========================================
        // 2. State Machine Functions (Modular)
        // ==========================================
        async function fetchDevices() {
            try {
                const { data, error } = await supabase.from(DB_TABLES.DEVICES).select('id, device_uid, car_model');
                if (error) throw error;
                if (data.length === 0) return statusBadge.innerText = "DB Empty!";
                
                deviceSelect.innerHTML = '<option value="">-- Choose a Device --</option>';
                data.forEach(d => deviceSelect.innerHTML += `<option value="${d.id}">${d.device_uid} (${d.car_model})</option>`);
                statusBadge.className = "px-3 py-1 bg-green-500/20 text-green-500 rounded text-xs font-bold border border-green-500/50";
                statusBadge.innerText = "Connected & Ready";
                log("Devices loaded successfully.");
            } catch (e) { log(`Init Error: ${e.message}`, 'error'); }
        }

        async function checkDeviceState(deviceId) {
            log(`Checking active state for device ${deviceId}...`);
            const { data, error } = await supabase.from(DB_TABLES.INCIDENTS)
                .select('*')
                .eq('device_id', deviceId)
                .not('status', 'in', '("completed","canceled")')
                .order('created_at', { ascending: false })
                .limit(1);

            if (error) {
                log(`State check error: ${error.message}`, 'error');
                return;
            }

            if (data && data.length > 0) {
                currentActiveIncident = data[0];
                log(`Found active incident #${currentActiveIncident.id} (${currentActiveIncident.status})`);
                
                // تحديث الخريطة بمكان الحادث النشط
                if (crashMarker) map.removeLayer(crashMarker);
                crashMarker = L.marker([currentActiveIncident.latitude, currentActiveIncident.longitude], {
                    icon: L.divIcon({ html: '<div class="text-2xl drop-shadow-[0_0_10px_rgba(220,38,38,0.8)]">💥</div>', className: '' })
                }).addTo(map);
                map.flyTo([currentActiveIncident.latitude, currentActiveIncident.longitude], 15);
                
                selectedLat = currentActiveIncident.latitude;
                selectedLng = currentActiveIncident.longitude;
                latDisplay.innerText = selectedLat.toFixed(5);
                lngDisplay.innerText = selectedLng.toFixed(5);
            } else {
                currentActiveIncident = null;
                if (crashMarker) map.removeLayer(crashMarker);
                selectedLat = null; selectedLng = null;
                latDisplay.innerText = "Not selected"; lngDisplay.innerText = "Not selected";
            }
            updateUIState();
        }

        async function createHardwareRequest(deviceId, lat, lng, type, payload, incId = null) {
            const { data, error } = await supabase.from('hardware_requests').insert([{
                device_id: deviceId, lat, lng, request_type: type, raw_payload: JSON.stringify(payload), incident_id: incId
            }]).select().single();
            if (error) throw error;
            return data;
        }

        async function createIncident(deviceId, hwReqId, lat, lng, gForce) {
            // حساب الـ Deadline بعد 10 ثواني من الآن
            const deadline = new Date(Date.now() + 10000).toISOString();
            const { data, error } = await supabase.from(DB_TABLES.INCIDENTS).insert([{
                device_id: deviceId, hardware_request_id: hwReqId, latitude: lat, longitude: lng,
                status: 'pending', g_force: gForce, confirmation_deadline: deadline
            }]).select().single();
            if (error) throw error;
            return data;
        }

        async function logIncident(incidentId, action, performedBy, note = '') {
            const { error } = await supabase.from('incident_logs').insert([{
                incident_id: incidentId, action, performed_by: performedBy, note
            }]);
            if (error) console.error("Log writing failed:", error);
        }

        // ==========================================
        // 3. Execution Protocols (Send / Cancel)
        // ==========================================
        triggerBtn.addEventListener('click', async () => {
            const deviceId = deviceSelect.value;
            triggerBtn.disabled = true; triggerBtn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> PROCESSING...";

            try {
                log(`[STEP 1] Generating Hardware Request (Alert)...`);
                const gForce = severitySelect.value === 'high' ? 9.5 : 4.5;
                const hwReq = await createHardwareRequest(deviceId, selectedLat, selectedLng, 'alert', { sensor: "G-Force", value: gForce, trigger: "auto" });

                log(`[STEP 2] Registering Incident with 10s Deadline...`);
                const incident = await createIncident(deviceId, hwReq.id, selectedLat, selectedLng, gForce);

                log(`[STEP 3] Writing Initial Logs...`);
                await logIncident(incident.id, 'created', `device:${deviceId}`, 'Initial impact detected via hardware');
                
                // ربط الهاردوير بالحادث
                await supabase.from('hardware_requests').update({ incident_id: incident.id }).eq('id', hwReq.id);

                log(`✅ SUCCESS: INC-${incident.id} created and ticking.`, 'success');
                currentActiveIncident = incident;
                updateUIState();

            } catch (error) {
                log(`❌ CRASH SIGNAL FAILED: ${error.message}`, 'error');
                triggerBtn.disabled = false; triggerBtn.innerHTML = "<i class='fa-solid fa-satellite-dish'></i> SEND CRASH SIGNAL";
            }
        });

        cancelBtn.addEventListener('click', async () => {
            if (!currentActiveIncident) return;
            const inc = currentActiveIncident;
            cancelBtn.disabled = true; cancelBtn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> CANCELING...";
            log(`🛑 INITIATING CANCEL PROTOCOL FOR INC-${inc.id}...`);

            try {
                // 1. Release Ambulance (If assigned)
                if (inc.assigned_ambulance_id) {
                    await supabase.from(DB_TABLES.AMBULANCES).update({ status: 'available' }).eq('id', inc.assigned_ambulance_id);
                    log(`- Resource Freed: Ambulance #${inc.assigned_ambulance_id}`, 'success');
                }

                // 2. Release Hospital Bed (If assigned)
                if (inc.assigned_hospital_id) {
                    const { data: h } = await supabase.from(DB_TABLES.HOSPITALS).select('available_beds').eq('id', inc.assigned_hospital_id).single();
                    if (h) {
                        await supabase.from(DB_TABLES.HOSPITALS).update({ available_beds: h.available_beds + 1 }).eq('id', inc.assigned_hospital_id);
                        log(`- Resource Freed: Hospital Bed`, 'success');
                    }
                }

                // 3. Update Incident State
                await supabase.from(DB_TABLES.INCIDENTS).update({
                    status: 'canceled', is_false_alarm: true, resolved_at: new Date().toISOString(),
                    assigned_ambulance_id: null, assigned_hospital_id: null
                }).eq('id', inc.id);

                // 4. Register Hardware Cancel Signal & Logs
                await createHardwareRequest(inc.device_id, selectedLat, selectedLng, 'cancel', { action: "user_canceled" }, inc.id);
                await logIncident(inc.id, 'canceled', `device:${inc.device_id}`, 'Hardware override (False Alarm)');

                log(`✅ INC-${inc.id} SUCCESSFULLY CANCELED. SYSTEM RESET.`, 'success');
                currentActiveIncident = null;
                if(crashMarker) map.removeLayer(crashMarker);
                updateUIState();

            } catch (error) {
                log(`❌ CANCEL FAILED: ${error.message}`, 'error');
            } finally {
                cancelBtn.disabled = false; cancelBtn.innerHTML = "<i class='fa-solid fa-ban text-red-400'></i> CANCEL INCIDENT (FALSE ALARM)";
            }
        });

        // ==========================================
        // 4. UI State Manager
        // ==========================================
        deviceSelect.addEventListener('change', () => {
            if(deviceSelect.value) checkDeviceState(deviceSelect.value);
            else { currentActiveIncident = null; updateUIState(); }
        });

        function updateUIState() {
            if (currentActiveIncident) {
                // Device has active incident: Show Cancel, Hide Send
                triggerBtn.classList.add('hidden');
                activeControlArea.classList.remove('hidden');
                activeControlArea.classList.add('flex');
                
                let sColor = currentActiveIncident.status === 'pending' ? 'text-warning' : 
                             currentActiveIncident.status === 'in_progress' ? 'text-purple-400' : 'text-blue-400';
                activeStatusDisplay.className = `font-black uppercase tracking-wider ${sColor}`;
                activeStatusDisplay.innerText = currentActiveIncident.status.replace('_', ' ');
            } else {
                // Idle State: Show Send, Hide Cancel
                triggerBtn.classList.remove('hidden');
                activeControlArea.classList.add('hidden');
                activeControlArea.classList.remove('flex');
                
                if (deviceSelect.value && selectedLat && selectedLng) {
                    triggerBtn.disabled = false;
                    triggerBtn.innerHTML = "<i class='fa-solid fa-satellite-dish'></i> SEND CRASH SIGNAL";
                } else {
                    triggerBtn.disabled = true;
                }
            }
        }

        fetchDevices();
    </script>
</body>
</html>
