<!DOCTYPE html>
<html lang="en" dir="ltr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnQaZ - Hardware Simulator (State Machine)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#dc2626', secondary: '#0f172a' } } }
        }
    </script>
</head>
<body class="bg-secondary text-white h-screen flex flex-col font-sans">

    <header class="bg-gray-900 border-b border-gray-800 p-4 flex justify-between items-center z-50 shadow-md">
        <a href="../index.html" class="flex items-center group">
            <img src="../assets/images/logoL.png" alt="EnQaZ Logo" class="h-16 sm:h-18 w-auto border-2 border-gray-400 rounded-lg object-contain bg-white group-hover:scale-105 transition-transform">
            <span class="ml-3 font-bold text-xl tracking-wider text-white hidden sm:block">EnQaZ <span class="text-primary text-sm tracking-normal ml-1">Hardware Simulator</span></span>
        </a>
        <div class="flex items-center gap-3">
            <div id="sysStatusBadge" class="flex items-center gap-2 bg-gray-800 px-3 py-1.5 rounded-lg border border-gray-700 text-sm font-bold shadow-inner">
                <span class="w-2.5 h-2.5 rounded-full bg-gray-500 animate-pulse" id="statusDot"></span>
                <span id="statusText" class="text-gray-300">Connecting...</span>
            </div>
        </div>
    </header>

    <div class="flex-1 overflow-hidden p-4 sm:p-6 flex justify-center items-start">
        <div class="w-full max-w-md flex flex-col gap-4">
            
            <div class="bg-gray-900 rounded-xl p-5 border border-gray-800 shadow-xl flex flex-col gap-4 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-gray-800 via-primary to-gray-800 opacity-50"></div>
                
                <h2 class="font-bold text-lg text-gray-200 border-b border-gray-800 pb-2"><i class="fa-solid fa-microchip text-blue-400 mr-2"></i> Device Selection</h2>
                
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-1.5 uppercase tracking-wider">Select Target Device</label>
                    <select id="deviceSelect" class="w-full bg-gray-800 border border-gray-700 text-white rounded-lg px-3 py-2.5 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all font-mono text-sm shadow-inner appearance-none">
                        <option value="">-- Load devices... --</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 pt-10 text-gray-400">
                        <i class="fa-solid fa-chevron-down text-xs"></i>
                    </div>
                </div>

                <div id="deviceInfoCard" class="hidden bg-gray-800/50 rounded-lg p-3 border border-gray-700/50 mt-2">
                     <div class="flex items-center gap-3">
                         <div class="w-10 h-10 rounded-full bg-blue-500/20 text-blue-400 flex items-center justify-center border border-blue-500/30">
                             <i class="fa-solid fa-car"></i>
                         </div>
                         <div>
                             <div id="devOwnerName" class="font-bold text-sm text-gray-200">Owner Name</div>
                             <div id="devPhone" class="text-xs text-gray-400 font-mono">Phone Number</div>
                         </div>
                     </div>
                </div>
            </div>

            <div class="bg-gray-900 rounded-xl p-5 border border-gray-800 shadow-xl flex flex-col gap-4">
                 <h2 class="font-bold text-lg text-gray-200 border-b border-gray-800 pb-2"><i class="fa-solid fa-bolt text-yellow-400 mr-2"></i> Hardware Action</h2>
                 
                 <div id="idleControlArea">
                     <p class="text-xs text-gray-400 mb-4">Location and speed will be automatically captured from the device's current live state.</p>
                     
                     <div class="grid grid-cols-2 gap-3 mb-4">
                         <div>
                             <label class="block text-xs font-bold text-gray-400 mb-1">G-Force</label>
                             <input type="number" id="gForceInput" value="4.5" step="0.1" class="w-full bg-gray-800 border border-gray-700 text-white rounded-lg px-3 py-2 outline-none font-mono text-sm">
                         </div>
                     </div>

                     <button id="triggerBtn" disabled class="w-full bg-red-600 hover:bg-red-500 disabled:bg-gray-800 disabled:text-gray-500 text-white font-black py-4 rounded-xl shadow-lg hover:shadow-red-500/20 transition-all uppercase tracking-widest text-sm relative overflow-hidden group">
                         <span class="relative z-10"><i class="fa-solid fa-satellite-dish mr-2"></i> Send Crash Signal</span>
                         <div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
                     </button>
                 </div>

                 <div id="activeControlArea" class="hidden flex-col gap-4">
                     <div class="bg-gray-800 border border-gray-700 rounded-lg p-4 flex flex-col items-center justify-center text-center">
                         <i class="fa-solid fa-triangle-exclamation text-warning text-3xl mb-2 animate-bounce"></i>
                         <div class="text-sm text-gray-400 uppercase tracking-widest mb-1">Current State</div>
                         <div id="activeStatusDisplay" class="font-black text-xl uppercase tracking-wider text-warning">PENDING</div>
                     </div>
                     <button id="cancelBtn" class="w-full bg-gray-800 hover:bg-gray-700 text-white border border-gray-700 font-bold py-3 rounded-lg shadow-sm transition-all uppercase tracking-wider text-sm flex items-center justify-center gap-2">
                         <i class="fa-solid fa-xmark text-red-400"></i> Cancel Hardware Request
                     </button>
                 </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase, DB_TABLES } from '../js/config/supabase.js';

        // Elements
        const deviceSelect = document.getElementById('deviceSelect');
        const triggerBtn = document.getElementById('triggerBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const deviceInfoCard = document.getElementById('deviceInfoCard');
        const devOwnerName = document.getElementById('devOwnerName');
        const devPhone = document.getElementById('devPhone');
        
        const activeControlArea = document.getElementById('activeControlArea');
        const idleControlArea = document.getElementById('idleControlArea');
        const activeStatusDisplay = document.getElementById('activeStatusDisplay');
        const gForceInput = document.getElementById('gForceInput');

        let devicesMap = {};
        let currentActiveIncident = null;

        // Initialize
        async function fetchDevices() {
            try {
                statusDot.className = "w-2.5 h-2.5 rounded-full bg-warning animate-pulse";
                statusText.innerText = "Fetching...";
                
                const { data, error } = await supabase.from(DB_TABLES.DEVICES).select('*, users(name, phone)');
                if (error) throw error;

                deviceSelect.innerHTML = '<option value="">-- Select Device --</option>';
                data.forEach(dev => {
                    devicesMap[dev.id] = dev;
                    const opt = document.createElement('option');
                    opt.value = dev.id;
                    opt.text = `${dev.device_uid} - ${dev.users?.name || 'Unknown'}`;
                    deviceSelect.appendChild(opt);
                });

                statusDot.className = "w-2.5 h-2.5 rounded-full bg-success shadow-[0_0_8px_rgba(16,185,129,0.8)]";
                statusText.innerText = "Connected";
                statusText.classList.replace('text-gray-300', 'text-success');

            } catch (err) {
                console.error("Error fetching devices:", err);
                statusDot.className = "w-2.5 h-2.5 rounded-full bg-red-500";
                statusText.innerText = "Connection Failed";
                deviceSelect.innerHTML = '<option value="">Error loading devices</option>';
            }
        }

        // Get live position of the device
        function getDeviceCurrentLocation(deviceId) {
            // First check simulation cache if in simulation mode
            const simCache = JSON.parse(localStorage.getItem('resq_sim_positions') || '{}');
            const simData = simCache[`devices_${deviceId}`];
            
            if (simData) {
                return {
                    lat: simData.lat,
                    lng: simData.lng,
                    speed: simData.speed || 80 // Default speed if not tracked yet
                };
            }

            // Fallback to database coordinates
            const dev = devicesMap[deviceId];
            if (dev && dev.lat && dev.lng) {
                return {
                    lat: parseFloat(dev.lat),
                    lng: parseFloat(dev.lng),
                    speed: dev.currentSpeed || 0
                };
            }

            // Absolute fallback (Default Cairo)
            return { lat: 30.0444, lng: 31.2357, speed: 0 };
        }

        async function checkActiveIncident(deviceId) {
            try {
                const { data, error } = await supabase
                    .from(DB_TABLES.INCIDENTS)
                    .select('*')
                    .eq('device_id', deviceId)
                    // Use .neq() chain — PostgREST casts .not('in',...) values against the enum
                    // and ANY uppercase or invalid spelling throws a 400. Only valid enum values allowed.
                    .neq('status', 'completed')
                    .neq('status', 'cancelled')
                    .order('created_at', { ascending: false })
                    .limit(1);
                
                if (error) throw error;
                currentActiveIncident = data && data.length > 0 ? data[0] : null;
                updateUIState();
            } catch (err) {
                console.error("Error checking incident:", err);
            }
        }

        // UI Updates
        deviceSelect.addEventListener('change', async (e) => {
            const devId = e.target.value;
            if (devId) {
                const dev = devicesMap[devId];
                devOwnerName.innerText = dev.users?.name || 'Unknown User';
                devPhone.innerText = dev.users?.phone || 'No Phone';
                deviceInfoCard.classList.remove('hidden');
                triggerBtn.disabled = false;
                await checkActiveIncident(devId);
            } else {
                deviceInfoCard.classList.add('hidden');
                triggerBtn.disabled = true;
                currentActiveIncident = null;
                updateUIState();
            }
        });

// Send Crash Signal
        triggerBtn.addEventListener('click', async () => {
            const devId = deviceSelect.value;
            if (!devId) return;

            const dev = devicesMap[devId];
            
            // Get live location and speed
            const liveData = getDeviceCurrentLocation(devId);
            const gForce = parseFloat(gForceInput.value) || 4.5;

            triggerBtn.disabled = true;
            triggerBtn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Sending...";

            try {
                // 1. Create Hardware Request ONLY (Acting strictly as hardware)
                const { data: hwReq, error: hwErr } = await supabase.from(DB_TABLES.HARDWARE_REQUESTS).insert([{
                    device_id: dev.id,
                    request_type: 'alert',
                    lat: liveData.lat,
                    lng: liveData.lng,
                    raw_payload: JSON.stringify({
                        speed: liveData.speed,
                        g_force: gForce,
                        crash_detected: true
                    })
                }]).select().single();

                if (hwErr) throw hwErr;

                // 🔴 تم حذف كود إنشاء الحادثة (Incident) من هنا.
                // لوحة التحكم (Dashboard Engine) هتلتقط هذا الطلب وتقوم بإنشاء الحادثة ببيانات كاملة.

            } catch (err) {
                console.error("Crash Signal Error:", err);
                triggerBtn.disabled = false;
                triggerBtn.innerHTML = "<i class='fa-solid fa-satellite-dish mr-2'></i> Send Crash Signal";
            }
        });
        // Cancel Signal
        cancelBtn.addEventListener('click', async () => {
            if (!currentActiveIncident) return;
            
            cancelBtn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Canceling...";
            cancelBtn.disabled = true;

            try {
                // 1. Send hardware cancel request strictly to unified ingestion
                await supabase.from(DB_TABLES.HARDWARE_REQUESTS).insert([{
                    device_id: currentActiveIncident.device_id,
                    request_type: 'cancel',
                    raw_payload: JSON.stringify({ 
                        source: "simulator",
                        reason: "User triggered cancel from simulator device"
                    })
                }]);

                // We NO LONGER update INCIDENTS directly.
                // HARDENED UI: Clear local state immediately for instant feedback
                currentActiveIncident = null;
                updateUIState();
            } catch (err) {
                console.error("Cancel Error:", err);
                alert("Failed to cancel.");
                cancelBtn.innerHTML = "<i class='fa-solid fa-xmark text-red-400'></i> Cancel Hardware Request";
                cancelBtn.disabled = false;
            }
        });

// Realtime Subscription
        supabase.channel('simulator-incidents')
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: DB_TABLES.INCIDENTS }, payload => {
                if (currentActiveIncident && payload.new.id === currentActiveIncident.id) {
                    currentActiveIncident = payload.new;
                    updateUIState();
                }
            })
            // إضافة مراقب لحدث الـ INSERT لالتقاط الحادثة فور إنشائها بواسطة النظام
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: DB_TABLES.INCIDENTS }, payload => {
                const selectedDevId = deviceSelect.value;
                if (!currentActiveIncident && String(payload.new.device_id) === String(selectedDevId)) {
                    currentActiveIncident = payload.new;
                    updateUIState();
                }
            })
            .subscribe();
        function updateUIState() {
            // Use lowercase 'cancelled' only — 'CANCELLED' is not a valid incident_status_enum value
            const isTerminal = !currentActiveIncident 
                || currentActiveIncident.status === 'cancelled'
                || currentActiveIncident.status === 'completed';

            if (!isTerminal) {
                idleControlArea.classList.add('hidden');
                activeControlArea.classList.remove('hidden');
                activeControlArea.classList.add('flex');
                
                let sColor = currentActiveIncident.status === 'pending' ? 'text-warning' : 
                             currentActiveIncident.status === 'in_progress' ? 'text-purple-400' : 'text-blue-400';
                activeStatusDisplay.className = `font-black text-xl uppercase tracking-wider ${sColor}`;
                activeStatusDisplay.innerText = currentActiveIncident.status.replace('_', ' ');
            } else {
                idleControlArea.classList.remove('hidden');
                activeControlArea.classList.add('hidden');
                activeControlArea.classList.remove('flex');
                
                if (deviceSelect.value) {
                    triggerBtn.disabled = false;
                    triggerBtn.innerHTML = "<i class='fa-solid fa-satellite-dish mr-2'></i> Send Crash Signal";
                }
            }
        }

        fetchDevices();
    </script>
</body>
</html>
