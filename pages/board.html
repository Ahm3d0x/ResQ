        <main class="flex-1 flex flex-col min-w-0 overflow-hidden lg:ml-64">

            <section class="flex-1 relative bg-gray-100 dark:bg-slate-900">

                </div>
            </footer>
        </main>
    </div>

    <script>
        // Function to load pages into iframe
        function loadPage(url) {
            const frame = document.getElementById('mainFrame');
            const title = document.getElementById('pageTitle');
            
            frame.src = url;
            
            // Extract title from URL for display
            const pageName = url.split('/').pop().replace('.html', '') || 'Home';
            title.innerText = pageName.charAt(0).toUpperCase() + pageName.slice(1);

            // Close sidebar on mobile after selection
            if(window.innerWidth < 1024) {
                document.getElementById('sidebar').classList.add('-translate-x-full');
            }
        }

        // Sidebar Toggle for Mobile
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        
        menuBtn.onclick = () => {
            sidebar.classList.toggle('-translate-x-full');
        }

        // Dark Mode Logic (Sync with your theme.js)
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.onclick = () => {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };

        // Check for saved theme
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        // Function to open link in a new tab
function openNewTab(url) {
    window.open(url, '_blank');
}
    </script>
